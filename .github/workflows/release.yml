name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., 0.1.0)'
        required: true

permissions:
  contents: write

env:
  CARGO_INCREMENTAL: 0

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 20
    strategy:
      matrix:
        target: [aarch64-apple-darwin, x86_64-apple-darwin]
    steps:
      - uses: actions/checkout@v5

      - name: Verify Cargo.toml version matches tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG_VERSION="${{ github.event.inputs.version }}"
          else
            TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          fi
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | cut -d'"' -f2)
          if [ "$CARGO_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Version mismatch: Cargo.toml says '$CARGO_VERSION' but release is tagged 'v$TAG_VERSION'."
            echo "::error::Bump Cargo.toml to '$TAG_VERSION' and retag, or re-run with the matching version."
            exit 1
          fi
          echo "✓ Cargo.toml version ($CARGO_VERSION) matches tag (v$TAG_VERSION)"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/bl dist/bl
          cd dist
          tar -czf bl-${{ matrix.target }}.tar.gz bl
          shasum -a 256 bl-${{ matrix.target }}.tar.gz > bl-${{ matrix.target }}.tar.gz.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bl-${{ matrix.target }}
          path: dist/bl-${{ matrix.target }}.tar.gz*

  universal:
    needs: build
    runs-on: macos-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create universal binary
        run: |
          mkdir -p work dist

          tar -xzf artifacts/bl-aarch64-apple-darwin/bl-aarch64-apple-darwin.tar.gz -C work
          mv work/bl work/bl-arm64
          tar -xzf artifacts/bl-x86_64-apple-darwin/bl-x86_64-apple-darwin.tar.gz -C work
          mv work/bl work/bl-x86_64

          lipo -create work/bl-arm64 work/bl-x86_64 -output work/bl-universal

          for arch in aarch64-apple-darwin x86_64-apple-darwin universal-apple-darwin; do
            if [ "$arch" = "universal-apple-darwin" ]; then
              cp work/bl-universal dist/bl
            elif [ "$arch" = "aarch64-apple-darwin" ]; then
              cp work/bl-arm64 dist/bl
            else
              cp work/bl-x86_64 dist/bl
            fi
            cd dist
            tar -czf bl-${arch}.tar.gz bl
            shasum -a 256 bl-${arch}.tar.gz >> checksums.txt
            rm bl
            cd ..
          done

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
            echo "tag=v${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            TAG="${GITHUB_REF#refs/tags/v}"
            echo "version=${TAG}" >> $GITHUB_OUTPUT
            echo "tag=v${TAG}" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "bl v${{ steps.version.outputs.version }}"
          body: |
            ## Install

            **Homebrew:**
            ```bash
            brew install baselayer-id/tap/bl
            ```

            **curl:**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/baselayer-id/bl/main/install.sh | bash
            ```

            **Manual:**
            Download the appropriate binary below, extract, and place in your PATH.
          files: |
            dist/bl-*.tar.gz
            dist/checksums.txt
          draft: false

  update-tap:
    needs: universal
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            TAG="${GITHUB_REF#refs/tags/v}"
            echo "version=${TAG}" >> $GITHUB_OUTPUT
          fi

      - name: Trigger Homebrew tap update
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.TAP_REPO_TOKEN }}
          repository: baselayer-id/homebrew-tap
          event-type: update-formula
          client-payload: '{"version": "${{ steps.version.outputs.version }}"}'
